services:
  - type: web
    name: pinagent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: ANTHROPIC_KEY
        sync: false
      - key: ALI_KEY
        sync: false
      - key: ALI_SECRET
        sync: false
      - key: ALI_TRACKING
        value: "529958"
      - key: PIN_TOKEN
        sync: false
      - key: PIN_BOARD_ID
        sync: false
      - key: TG_TOKEN
        sync: false
      - key: TG_CHANNEL
        value: "@Ofertassdiariasaliexpresss"
